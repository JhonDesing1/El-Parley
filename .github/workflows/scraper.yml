name: Scraper de cuotas (Betplay & Wplay)

on:
  schedule:
    # Cada 15 minutos (GitHub Actions mínimo es 5 min)
    - cron: "*/15 * * * *"
  workflow_dispatch: # Permite correrlo manualmente desde GitHub

jobs:
  scrape:
    name: Extraer cuotas
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        working-directory: scraper
        run: npm install

      - name: Compilar
        working-directory: scraper
        run: npm run build

      - name: Correr scraper
        working-directory: scraper
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node dist/index-once.mjs
